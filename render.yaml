services:
  - type: web
    name: crescendo
    env: node
    region: singapore
    buildCommand: npm install && cd server && npm install && cd .. && npm run build
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DISABLE_AUTO_CRAWL
        value: "true"
      - key: AI_API_KEY
        sync: false
      - key: AI_ENDPOINT
        sync: false
      - key: AI_MODEL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: AGNES_API_KEY
        sync: false
      - key: TURSO_DB_URL
        sync: false
      - key: TURSO_DB_TOKEN
        sync: false
